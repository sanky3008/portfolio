                <div class="stage" id="stage-${stage.id}">
                    <div class="stage-header" onclick="toggleStage(this)">
                        <div class="stage-info">
                            <span class="stage-num">${stage.num}</span>
                            <span class="stage-title">${stage.title}</span>
                        </div>
                        <span class="stage-toggle">+</span>
                    </div>
                    <div class="stage-body">
                        <div class="stage-body-inner">
                            <div class="stage-content">${subs}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function arrow() {
            return `<div class="conn"><div class="conn-line"></div><div class="conn-head"></div></div>`;
        }

        function init() {
            const S = STAGES;
            const el = document.getElementById('infographic');

            const chain = `
                <div class="chain">
                    <div class="row-dual">
                        ${renderStageCard(S.data)}
                        ${renderStageCard(S.infra)}
                    </div>
                    ${arrow()}
                    ${renderStageCard(S.training)}
                    ${arrow()}
                    ${renderStageCard(S.customization)}
                    ${arrow()}
                    ${renderStageCard(S.inference)}
                    ${arrow()}
                    <div class="row-triple">
                        ${renderStageCard(S.tooling)}
                        <div class="hub-arrow-h">
                            <svg width="100%" height="16" viewBox="0 0 32 16" preserveAspectRatio="xMidYMid meet" fill="none">
                                <line x1="6" y1="8" x2="26" y2="8" stroke="#c0bbb7" stroke-width="1.5"/>
                                <path d="M2 8 L8 4 L8 12 Z" fill="#c0bbb7"/>
                                <path d="M30 8 L24 4 L24 12 Z" fill="#c0bbb7"/>
                            </svg>
                        </div>
                        ${renderStageCard(S.orchestration)}
                        <div class="hub-arrow-h">
                            <svg width="100%" height="16" viewBox="0 0 32 16" preserveAspectRatio="xMidYMid meet" fill="none">
                                <line x1="6" y1="8" x2="26" y2="8" stroke="#c0bbb7" stroke-width="1.5"/>
                                <path d="M2 8 L8 4 L8 12 Z" fill="#c0bbb7"/>
                                <path d="M30 8 L24 4 L24 12 Z" fill="#c0bbb7"/>
                            </svg>
                        </div>
                        ${renderStageCard(S.context)}
                    </div>
                    <div class="conn" id="conn-after-triple"><div class="conn-line"></div><div class="conn-head"></div></div>
                    <div class="stage stage-apps" id="stage-apps">
                        <div class="stage-header">
                            <div class="stage-info">
                                <span class="stage-num">07</span>
                                <span class="stage-title">applications<span class="apps-desc"> · horizontal + vertical</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const layers = LAYERS.map(l => `
                <div class="layer">
                    <div class="layer-header" onclick="toggleLayer(this)">
                        <span class="layer-title">${l.title}</span>
                        <span class="layer-toggle">+</span>
                    </div>
                    <div class="layer-body">
                        <div class="layer-body-inner">
                            <div class="layer-pills">${l.companies.map(c => pill(c, 'layer-pill')).join('')}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            const sidebar = `
                <div class="layers-section">
                    <div class="layers-label">cross-cutting layers</div>
                    <p class="layers-desc">span the entire stack</p>
                    ${layers}
                </div>
            `;

            el.innerHTML = chain + sidebar;
        }

        function toggleStage(header) {
            const stage = header.parentElement;
            stage.classList.toggle('open');

            if (stage.closest('.row-triple')) {
                animateTripleArrow();
            }
        }

        function animateTripleArrow() {
            const start = performance.now();
            function tick() {
                updateTripleArrow();
                if (performance.now() - start < 350) {
                    requestAnimationFrame(tick);
                }
            }
            requestAnimationFrame(tick);
        }

        function isMobile() {
            return window.matchMedia('(max-width: 680px)').matches;
        }

        function updateTripleArrow() {
            const row = document.querySelector('.row-triple');
            const orchCard = document.getElementById('stage-orchestration');
            const conn = document.getElementById('conn-after-triple');
            if (!row || !orchCard || !conn) return;

            if (isMobile()) {
                conn.querySelector('.conn-line').style.height = '20px';
                conn.style.marginTop = '0px';
                return;
            }

            const rowBottom = row.getBoundingClientRect().bottom;
            const orchBottom = orchCard.getBoundingClientRect().bottom;
            const extra = Math.max(0, rowBottom - orchBottom);

            conn.querySelector('.conn-line').style.height = (20 + extra) + 'px';
            conn.style.marginTop = -extra + 'px';
        }

        function toggleLayer(header) {
            const layer = header.parentElement;
            layer.classList.toggle('open');
        }

        document.addEventListener('DOMContentLoaded', () => {
            init();
            updateTripleArrow();
            window.addEventListener('resize', updateTripleArrow);
        });
    </script>
</body>
</html>
